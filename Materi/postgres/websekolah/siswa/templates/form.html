
{% extends 'base.html' %}

{% block title %}
   Form Siswa
{% endblock %}

{% block content %}
<form method="post" class="space-y-5">
    <!-- token keamanan anti-CSRF -->
    {% csrf_token %}
    <h1 class="text-3xl font-bold text-slate-900">
        Tambah Siswa
    </h1>  
<p class="text-gray-600">Silahkan Edit, kalau mau <span class="text-red-600">XD</span></p>
<h4 class="text-lg font-semibold text-slate-800">Kalau kagak balik sono, <span class="text-blue-600">Kocak</span></h4>

    <!-- form inputannya disini ntar -->
     
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Nama</label>
        <input type="text" name="nama" value="" required
               class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Umur</label>
        <input type="number" name="umur" value="" required
               class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Tanggal Lahir</label>
        <input type="date" name="tgl_lahir" value="" required 
               class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Status Hadir</label>
        <input type="radio" name="status_hadir" value="True" class="mr-2">
        <label class="mr-4">Hadir</label>
        <input type="radio" name="status_hadir" value="False" class="mr-2">
        <label>Tidak Hadir</label>
    </div>

    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Nilai Akhir</label>
        <input min="1" max="100" type="number" name="nilai_akhir" value="" required placeholder="Max 100"
               class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div class="flex gap-3 pt-2">
        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">
            Simpan
        </button>

        <a href="{% url 'siswa_list' %}"
           class="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm font-medium hover:bg-slate-200">
            Batal
        </a>
    </div>
</form>
{% endblock %}
